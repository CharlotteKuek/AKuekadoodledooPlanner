[data-theme="dark"] .modal input[type=text],[data-theme="dark"] #linkbox input,[data-theme="dark"] .modal select{background:var(--field);color:var(--ink)}
[data-theme="dark"] .item .box,[data-theme="dark"] .richnote .ck:not(:checked){background:rgba(255,255,255,.07)}
[data-theme="dark"] .tasks-body .item .box,[data-theme="dark"] .richnote .ck:not(:checked){border-color:rgba(255,255,255,.4)}
[data-theme="dark"] .rich-host td{border-color:var(--tbl-border)}
[data-theme="dark"] .fpick>button,[data-theme="dark"] #toolbar select{background:var(--field);color:var(--ink)}
/* body text stays light and readable everywhere */
[data-theme="dark"] .item .txt,[data-theme="dark"] .notes-body,[data-theme="dark"] .richnote,[data-theme="dark"] .idea-title,[data-theme="dark"] .idea-body,[data-theme="dark"] .tasks-body,[data-theme="dark"] .cell-name,[data-theme="dark"] .cell .item .txt{color:var(--ink)}
/* grid day-cells: real dark cards with a coloured left accent from the pastel, not a dim wash */
[data-theme="dark"] .cell{filter:none;background:#24222c!important;border-left:4px solid var(--cell-accent,transparent)}
[data-theme="dark"] .cell .cell-name,[data-theme="dark"] .cell .cell-date,[data-theme="dark"] .cell .item .txt{color:var(--ink)}
/* section bodies: proper dark cards; the section colour lives in the title + a left border stripe */
[data-theme="dark"] .tasks-body,[data-theme="dark"] .notes-body{background:var(--card);border-color:var(--line);border-left:4px solid var(--sec-ink,transparent)}
[data-theme="dark"] .detpanel,[data-theme="dark"] .idea,[data-theme="dark"] #ideaslaunch,[data-theme="dark"] #projdet .detbtn,[data-theme="dark"] .dl-body,[data-theme="dark"] .dl-row{background:var(--card)}
[data-theme="dark"] .sec-title{color:var(--sec-ink-dark,var(--ink))}
[data-theme="dark"] .sec-title::after{background:var(--sec-ink-dark,var(--accent))}
[data-theme="dark"] a{color:#8fb4ec}
[data-theme="dark"] .credit img{opacity:1}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:16px;line-height:1.55}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
svg{flex-shrink:0}
[contenteditable]{outline:none;min-width:1ch}
[contenteditable]:empty::before{content:attr(data-ph);color:var(--ink-soft);opacity:0;pointer-events:none;transition:opacity .12s}
[contenteditable]:empty:hover::before,[contenteditable]:empty:focus::before{opacity:.5}
a{color:#5b8dd6;text-decoration:underline;text-underline-offset:2px;word-break:break-all}
img{max-width:100%}

/* ---------- top chrome: clearer tabs ---------- */
#topbar{position:relative;z-index:40;background:color-mix(in srgb,var(--bg) 88%,white);border-bottom:1px solid var(--line)}
#toolbar{position:sticky;top:0;z-index:44;background:color-mix(in srgb,var(--bg) 92%,white);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-row{display:flex;align-items:center;gap:8px;padding:9px 14px 0;max-width:1060px;margin:0 auto;flex-wrap:wrap}
#mains{display:flex;align-items:center;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#mains::-webkit-scrollbar{display:none}
.maintab{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:11px;font-size:14px;font-weight:700;color:var(--brown);background:var(--brown-soft);white-space:nowrap;border:1.5px solid transparent}
.maintab.active{background:var(--brown);color:#fff;box-shadow:0 3px 10px rgba(138,109,82,.28)}
.maintab .emobtn{padding:0 1px;font-size:14px;color:inherit;opacity:.9;display:inline-flex;align-items:center}
.maintab .emobtn svg{opacity:.5}
.subtab .emobtn{padding:0 1px;font-size:13px;color:inherit;opacity:.85;display:inline-flex;align-items:center}
.subtab .emobtn svg{opacity:.45}
.maintab .tx{outline:none}
.tabdel{opacity:0;padding:2px;color:inherit;margin-left:1px}
.tabdup{opacity:0;padding:2px;color:inherit}
.maintab:hover .tabdup,.subtab:hover .tabdup{opacity:.5}
.tabdup:hover{opacity:1}
.maintab:hover .tabdel,.subtab:hover .tabdel{opacity:.6}
.tabdel:hover{opacity:1}
#addmain{padding:7px 11px;color:var(--brown);border-radius:10px;border:1.5px dashed var(--brown-soft)}
#addmain:hover{background:var(--brown-soft)}
.bar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
#savestate{font-size:11.5px;color:var(--ink-soft);min-width:52px;text-align:right}
#gear{padding:6px;border-radius:8px;color:var(--ink-soft)}
#gear:hover{background:var(--line);color:var(--ink)}
#undobtn,#redobtn{padding:6px;border-radius:8px;color:var(--ink-soft)}
#undobtn:hover,#redobtn:hover{background:var(--line);color:var(--ink)}
#undobtn:disabled,#redobtn:disabled{opacity:.28;cursor:default}
#searchbtn,#fullbtn,#refreshbtn{padding:6px;border-radius:8px;color:var(--ink-soft)}
#searchbtn:hover,#fullbtn:hover,#refreshbtn:hover{background:var(--line);color:var(--ink)}
#refreshbtn.spinning svg{animation:spin .5s linear}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* search overlay */
#searchoverlay{position:fixed;inset:0;z-index:90;background:rgba(30,25,20,.34);display:flex;align-items:flex-start;justify-content:center;padding-top:9vh}
#searchbox{background:var(--card);width:min(620px,92vw);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.32);overflow:hidden;max-height:76vh;display:flex;flex-direction:column}
#searchhead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
#searchinput{flex:1;border:none;background:none;font-family:inherit;font-size:17px;color:var(--ink);outline:none}
#searchresults{overflow-y:auto;padding:6px}
.sr-item{display:block;width:100%;text-align:left;padding:10px 12px;border-radius:10px;cursor:pointer}
.sr-item:hover,.sr-item.cur{background:var(--line)}
.sr-item .sr-loc{font-size:11.5px;color:var(--ink-soft);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.sr-item .sr-txt{font-size:14.5px}
.sr-item .sr-txt mark{background:color-mix(in srgb,var(--accent) 45%,white);color:inherit;border-radius:3px;padding:0 1px}
.sr-empty{padding:22px 14px;color:var(--ink-soft);font-size:14px;text-align:center}
/* sub tab bar sits in a soft brown tray so the grouping is obvious */
#subtray{max-width:1060px;margin:0 auto;padding:0 14px}
#subrow{display:flex;align-items:center;gap:3px;background:var(--brown-soft);border-radius:12px 12px 0 0;padding:7px 8px 0;margin-top:9px;overflow-x:auto;scrollbar-width:none;border:1.5px solid var(--brown-soft);border-bottom:none}
#subrow::-webkit-scrollbar{display:none}
.subtab.trail{background:color-mix(in srgb,var(--accent) 16%,var(--card));box-shadow:inset 0 0 0 1.5px color-mix(in srgb,var(--accent) 45%,transparent)}
.crumb{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;background:var(--accent);color:#fff;border-radius:9px 9px 0 0;padding:7px 8px 7px 6px;margin-left:1px;font-size:12.5px;font-weight:700;align-self:flex-end;box-shadow:0 -1px 6px color-mix(in srgb,var(--accent) 30%,transparent)}
.crumb-arrow{display:inline-flex;opacity:.85}
.crumb-arrow svg{stroke:#fff}
.crumb-tx{white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.crumb-x{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:6px;background:rgba(255,255,255,.22)}
.crumb-x:hover{background:rgba(255,255,255,.38)}
.crumb-x svg{stroke:#fff}
.subtab{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px 9px 0 0;font-size:13.5px;font-weight:600;color:#9a8a78;white-space:nowrap}
.subtab.active{background:var(--bg);color:var(--ink);box-shadow:0 -2px 8px rgba(138,109,82,.1)}
.subtab .info,.projinfo{color:inherit;opacity:.7;padding:1px;display:inline-flex}
.subtab .info:hover{opacity:1}
.subtab .badge{font-size:9px;font-weight:800;letter-spacing:.05em;background:var(--accent);color:#fff;border-radius:5px;padding:1px 5px}
.subtab .lockb{font-size:9px;font-weight:800;background:#c9bdae;color:#fff;border-radius:5px;padding:1px 5px}
#addsub{padding:6px 9px;color:#9a8a78;border-radius:8px}
#addsub:hover{background:rgba(255,255,255,.5);color:var(--brown)}
.dl-tab{padding:6px 9px;color:#9a8a78;border-radius:8px;margin-left:2px}
.dl-tab:hover{background:rgba(255,255,255,.5);color:#d64545}
.dl-tab.active{background:var(--bg);color:#d64545}
.subtab-ghost{position:fixed;z-index:200;pointer-events:none;background:var(--accent);color:#fff;font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.maintab.droptarget{outline:2px dashed var(--accent);outline-offset:2px;background:color-mix(in srgb,var(--accent) 22%,var(--brown-soft))}
body.subdragging{cursor:grabbing}
body.subdragging .subtab{cursor:grabbing}
#toolbar{display:flex;align-items:center;gap:2px;padding:8px 14px 6px;max-width:1060px;margin:0 auto;flex-wrap:wrap}
#toolbar>button{padding:4px 9px;border-radius:7px;font-size:13.5px;color:var(--ink-soft);font-weight:700}
#toolbar>button:hover{background:var(--line);color:var(--ink)}
#toolbar .sep{width:1px;height:16px;background:var(--line);margin:0 6px}
#fssize{font-size:12px;font-weight:800;color:var(--ink-soft);min-width:26px;text-align:center;padding:2px 4px;cursor:text;font-variant-numeric:tabular-nums;border-radius:5px;outline:none}
#fssize:hover{background:var(--line);color:var(--ink)}
#fssize[contenteditable="true"]{background:var(--card);box-shadow:0 0 0 2px var(--accent)}
#toolbar .hint{font-size:11px;color:var(--ink-soft);margin-left:auto;opacity:.8}
#colorbtn u{text-decoration-thickness:3px}

.fpick{position:relative}
.fpick>button{border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12.5px;background:var(--card);color:var(--ink);max-width:180px}
.fpick .fmenu{position:absolute;top:calc(100% + 4px);left:0;z-index:80;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.14);max-height:300px;overflow-y:auto;width:215px;padding:5px}
.fpick .fmenu button{display:block;width:100%;text-align:left;padding:7px 11px;border-radius:8px;font-size:15px}
.fpick .fmenu button:hover{background:var(--line)}
.fpick .fmenu button.cur{background:color-mix(in srgb,var(--accent) 22%,white)}

#page{max-width:1060px;margin:0 auto;padding:0 16px 90px}
#banner{height:150px;border-radius:0 0 var(--radius) var(--radius);background-size:cover;background-position:center;position:relative;margin:0 -2px}
#banner .banner-btn{position:absolute;right:10px;bottom:10px;background:rgba(255,255,255,.85);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;color:#6b675e;opacity:0;transition:.15s}
#banner:hover .banner-btn,#banner .banner-btn:focus{opacity:1}
#titlerow{display:flex;align-items:center;gap:10px;margin:18px 4px 4px}
#tabtitle{font-size:34px;font-weight:700;letter-spacing:-.01em}
#titlerow .projinfo,#titlerow .v-projinfo{color:var(--ink-soft);padding:6px;border-radius:9px;border:1px solid var(--line)}
#titlerow .projinfo:hover{color:var(--ink);border-color:var(--accent)}
#tabsub{color:var(--ink-soft);font-size:13.5px;margin:0 4px 22px}

/* ---------- sections ---------- */
.section{margin-bottom:30px;position:relative}
.sec-head{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.sec-title{font-size:20px;font-weight:700;color:var(--sec-ink,var(--ink))}
.sec-title::after{content:"";display:block;width:44px;height:4px;border-radius:4px;background:var(--sec-ink,var(--accent));margin-top:4px}
.sec-tools{display:flex;gap:1px;margin-left:auto;opacity:0;transition:.15s}
.section:hover .sec-tools,.section:hover .draghandle{opacity:1}
.tool{padding:5px;border-radius:7px;color:var(--ink-soft)}
.tool:hover{background:var(--line);color:var(--ink)}
.tool.warn:hover{color:#c96a6a}
.tool.armed{color:#c96a6a;font-size:11.5px;font-weight:700}
.draghandle{padding:4px 3px;border-radius:7px;color:var(--ink-soft);cursor:grab;touch-action:none;opacity:0;transition:.15s}
.draghandle:hover{background:var(--line);color:var(--ink)}
.dragging{opacity:.55}
.colordot{width:15px;height:15px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);flex-shrink:0;padding:0;cursor:pointer}
.palette{position:fixed;z-index:70;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;display:grid;grid-template-columns:repeat(5,22px);gap:7px;box-shadow:0 6px 20px rgba(0,0,0,.12)}
.palette div{width:22px;height:22px;border-radius:50%;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)}
.palette .clr{grid-column:1/-1;font-size:11px;color:var(--ink-soft);text-align:center;cursor:pointer;padding-top:2px}

/* tinted body when a section colour is set */
.tasks-body,.notes-body{background:var(--sec-tint,var(--card));border:1px solid var(--sec-border,var(--line));border-radius:var(--radius);box-shadow:var(--shadow)}
.tasks-body{padding:13px 16px;min-height:64px;cursor:text}
.notes-body{padding:16px 18px;min-height:110px;font-size:15.5px}
.notes-body>*:first-child{margin-top:0}
.notes-body>*:last-child{margin-bottom:0}
.notes-body img,.richdrop img,.rich-host img{border-radius:10px;cursor:pointer;vertical-align:bottom;max-width:100%}
.notes-body img.img-block,.richdrop img.img-block,.rich-host img.img-block{display:block;margin:8px 0}
.notes-body img.img-inline,.richdrop img.img-inline,.rich-host img.img-inline{display:inline-block;margin:0 3px;vertical-align:middle}
.notes-body img.img-left,.richdrop img.img-left,.rich-host img.img-left{float:left;margin:4px 12px 6px 0}
.notes-body img.img-right,.richdrop img.img-right,.rich-host img.img-right{float:right;margin:4px 0 6px 12px}
/* rich note blocks — consistent spacing so every line sits evenly, whatever its font size */
.richnote{font-size:15.5px;line-height:1.5}
.richnote>div,.richnote>p{margin:0;min-height:1.5em;line-height:1.5}
.richnote>div:not(:last-child),.richnote>p:not(:last-child){margin-bottom:4px}
.richnote .ck-line+.ck-line{margin-top:0}
.richnote h3{font-size:17px;font-weight:800;margin:10px 0 4px;line-height:1.35}
.richnote ul,.richnote ol{margin:4px 0 4px 4px;padding-left:20px}
.richnote li{margin:2px 0;line-height:1.5}
.richnote .ck-line{display:flex;align-items:flex-start;gap:8px;margin:0 0 4px;line-height:1.5}
.richnote .ck{-webkit-appearance:none;appearance:none;width:17px;height:17px;border-radius:5px;border:1.6px solid var(--cell-line);background:var(--field);flex-shrink:0;margin:0;margin-top:.2em;cursor:pointer;position:relative}
.richnote .ck:checked{background:var(--accent);border-color:var(--accent)}
.richnote .ck:checked::after{content:"";position:absolute;left:5px;top:2px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.richnote .ck-txt{color:var(--ink);flex:1;line-height:1.5;min-width:1ch}
.richnote .ck-line:has(.ck:checked) .ck-txt{text-decoration:line-through;opacity:.5}
.rich-host table{border-collapse:collapse;margin:10px 0;table-layout:fixed}
.rich-host td{border:1px solid #d9d2c6;padding:6px 9px;min-width:40px;vertical-align:top;position:relative;word-break:break-word}
.rich-host td.cell-sel{box-shadow:inset 0 0 0 2px color-mix(in srgb,var(--accent) 70%,white);background-image:linear-gradient(color-mix(in srgb,var(--accent) 12%,transparent),color-mix(in srgb,var(--accent) 12%,transparent))}
.rich-host table.tbl-active{outline:1px dashed color-mix(in srgb,var(--accent) 45%,white);outline-offset:3px}
.rich-host table.rs td{cursor:col-resize}
body.celldrag,body.celldrag *{-webkit-user-select:none!important;user-select:none!important}
.notes-body,.richnote,.dl-task,.txt,.rich-host,[contenteditable]{-webkit-user-select:text;user-select:text}
img.img-selected{outline:3px solid var(--accent);outline-offset:2px}
#imgbar,#tablebar{position:fixed;z-index:82;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.16);padding:8px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-width:min(520px,94vw);max-height:min(340px,70vh);overflow:auto}
#imgbar input[type=range]{width:120px;accent-color:var(--accent)}
#imgbar button,#tablebar button{font-size:12px;font-weight:700;color:var(--ink-soft);padding:4px 8px;border-radius:7px;border:1px solid var(--line)}
#imgbar button:hover,#tablebar button:hover{background:var(--line);color:var(--ink)}
#tablebar .mini{font-size:11px;color:var(--ink-soft);width:100%;margin-bottom:-2px}
#tablebar .grp{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
#tablebar .divider{width:100%;height:1px;background:var(--line);margin:4px 0}
#tablebar .selinfo{font-size:11px;color:var(--ink-soft);width:100%}
.rz-col{position:absolute;top:0;right:-3px;width:7px;height:100%;cursor:col-resize;z-index:3}
.rz-row{position:absolute;left:0;bottom:-3px;height:7px;width:100%;cursor:row-resize;z-index:3}
.dropglow{outline:2px dashed var(--accent);outline-offset:-6px}
/* ---------- deadlines section ---------- */
.dl-body{background:var(--sec-tint,var(--card));border:1px solid var(--sec-border,var(--line));border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 12px}
.dl-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dl-sortlabel{font-size:11.5px;color:var(--ink-soft)}
.dl-seg.seg button{padding:4px 10px}
.dl-list{display:flex;flex-direction:column;gap:2px}
.dl-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:9px;border-left:4px solid transparent}
.dl-row:hover{background:rgba(0,0,0,.03)}
[data-theme="dark"] .dl-row:hover{background:rgba(255,255,255,.04)}
.dl-row .draghandle{opacity:0}
.dl-row:hover .draghandle{opacity:.55}
.dl-check{width:17px;height:17px;border-radius:5px;border:1.6px solid var(--cell-line);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.dl-row.done .dl-check{background:var(--accent);border-color:var(--accent)}
.dl-task{flex:1;font-size:15px;min-width:0}
.dl-row.done .dl-task{text-decoration:line-through;opacity:.5}
.dl-due{width:120px;flex-shrink:0;border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--field);text-align:center}
.dl-due:focus{border-color:var(--accent);outline:none}
.dl-del{opacity:0;flex-shrink:0}
.dl-row:hover .dl-del{opacity:.6}
.dl-add{color:var(--ink-soft);font-size:13.5px;padding:7px 6px;border-radius:9px;width:100%;text-align:left;margin-top:2px}
.dl-add:hover{background:rgba(0,0,0,.04);color:var(--ink)}
[data-theme="dark"] .dl-add:hover{background:rgba(255,255,255,.05)}
/* bucket accents on the left stripe + due pill */
.dl-row.bkt-overdue{border-left-color:#7a1616;background:rgba(122,22,22,.05)}
.dl-row.bkt-asap{border-left-color:#c0392b;background:rgba(192,57,43,.045)}
.dl-row.bkt-soon{border-left-color:#e8837a;background:rgba(232,131,122,.05)}
.dl-row.bkt-future{border-left-color:#f0c0ba}
.dl-tag{flex-shrink:0;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.02em;white-space:nowrap;text-transform:uppercase}
.dl-tag .tg-short{display:none}
.dl-tag.tag-overdue{background:#7a1616;color:#fff}
.dl-tag.tag-asap{background:#c0392b;color:#fff}
.dl-tag.tag-soon{background:#f2d0cb;color:#8a3730}
[data-theme="dark"] .dl-tag.tag-soon{background:#5a2420;color:#f0c9c3}
.dl-row.done .dl-tag{display:none}
/* date field coloured by urgency — all shades of red, darker = more urgent */
.dl-row .dl-due{border:1px solid var(--line)}
.dl-row.bkt-overdue .dl-due{background:#7a1616;color:#fff;border-color:#5e1010;font-weight:700}
.dl-row.bkt-asap .dl-due{background:#c0392b;color:#fff;border-color:#a52f24;font-weight:700}
.dl-row.bkt-soon .dl-due{background:#e8837a;color:#5a1512;border-color:#dd6c62;font-weight:600}
.dl-row.bkt-future .dl-due{background:#f6dcd8;color:#8a3730;border-color:#eec7c1}
.dl-row.bkt-none .dl-due{background:var(--field);color:var(--ink-soft)}
[data-theme="dark"] .dl-row.bkt-soon .dl-due{background:#8a3a33;color:#f6d5d0}
[data-theme="dark"] .dl-row.bkt-future .dl-due{background:#4a2b28;color:#f0c9c3}
[data-theme="dark"] .dl-row.bkt-none .dl-due{background:var(--field)}
/* deadlines overview (the small deadline sub-tab) */
.dl-overview{margin-top:6px}
.dl-ov-group{margin-bottom:18px}
.dl-ov-group .dl-ov-item{background:var(--card)}
.dl-ov-group .dl-ov-item:first-of-type{border-top-left-radius:10px;border-top-right-radius:10px}
.dl-ov-group .dl-ov-item:last-of-type{border-bottom-left-radius:10px;border-bottom-right-radius:10px}
.dl-ov-head{font-weight:800;font-size:16.5px;margin:0 0 8px;display:flex;align-items:center;gap:9px;padding:6px 12px;border-radius:9px}
.dl-ov-head .cnt{font-size:11.5px;font-weight:800;color:#fff;border-radius:20px;padding:1px 9px;background:rgba(0,0,0,.25)}
.dl-ov-head.bk-overdue{background:#7a1616;color:#fff}
.dl-ov-head.bk-asap{background:#c0392b;color:#fff}
.dl-ov-head.bk-soon{background:#f2d0cb;color:#7a2b23}
.dl-ov-head.bk-soon .cnt{background:#c0392b}
.dl-ov-head.bk-future{background:#f7e6e2;color:#8a3730}
.dl-ov-head.bk-future .cnt{background:#c88a82}
.dl-ov-head.bk-none{background:var(--line);color:var(--ink-soft)}
.dl-ov-head.bk-none .cnt{background:#9a968d}
.dl-ov-head.bysection{background:var(--brown-soft);color:var(--ink)}
.dl-ov-head.bysection .cnt{background:var(--accent)}
[data-theme="dark"] .dl-ov-head.bk-soon{background:#5a2420;color:#f0c9c3}
[data-theme="dark"] .dl-ov-head.bk-future{background:#43201d;color:#e6b8b1}
/* compact rows: many deadlines readable at a glance */
.dl-ov-item{display:flex;align-items:center;gap:9px;padding:4px 10px 4px 8px;border-radius:7px;border-left:3px solid transparent;line-height:1.35}
.dl-ov-item+.dl-ov-item{border-top:1px solid var(--line)}
.dl-ov-item:hover{background:rgba(0,0,0,.025)}
[data-theme="dark"] .dl-ov-item:hover{background:rgba(255,255,255,.03)}
.dl-ov-check{width:17px;height:17px;flex-shrink:0;border:1.6px solid var(--cell-line);border-radius:5px;background:var(--field);display:inline-flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;padding:0}
.dl-ov-check svg{stroke:#fff}
.dl-ov-item.done .dl-ov-check{background:var(--accent);border-color:var(--accent)}
.dl-ov-item.done .t{text-decoration:line-through;opacity:.45}
.dl-ov-item .d{font-size:12px;color:var(--ink-soft);flex-shrink:0;font-weight:700;min-width:52px}
.dl-ov-item .t{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-ov-item .src{font-size:10.5px;color:var(--ink-soft);opacity:.7;flex-shrink:0;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-ov-item.bkt-overdue{border-left-color:#7a1616}
.dl-ov-item.bkt-overdue .d{color:#7a1616}
.dl-ov-item.bkt-asap{border-left-color:#c0392b}
.dl-ov-item.bkt-asap .d{color:#c0392b}
.dl-ov-item.bkt-soon{border-left-color:#e8837a}
.dl-ov-item.bkt-soon .d{color:#c85a50}
.dl-ov-item.bkt-future{border-left-color:#f0c0ba}
.dl-ov-empty{color:var(--ink-soft);font-size:13.5px;padding:6px 2px}

/* ---------- items ---------- */
.item{display:flex;align-items:flex-start;gap:5px;padding:2.5px 0;position:relative}
.item .itemgrip{position:absolute;left:-16px;top:2px;width:14px;height:20px;padding:0;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);cursor:grab;touch-action:none;opacity:0;transition:opacity .1s;border-radius:5px}
.item:hover .itemgrip{opacity:.45}
.item .itemgrip:hover{opacity:.9;background:rgba(0,0,0,.06)}
.item.dragging{opacity:.6;background:color-mix(in srgb,var(--accent) 10%,transparent);border-radius:7px;pointer-events:none}
.itemlist,.tasks-body{padding-left:18px}
.item .addbtn{flex-shrink:0;width:18px;height:18px;margin-top:3px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-soft);opacity:0;transition:.12s}
.item:hover .addbtn{opacity:.55}
.item .addbtn:hover{opacity:1;background:rgba(0,0,0,.07)}
.item .box{width:17px;height:17px;border-radius:5px;border:1.6px solid rgba(0,0,0,.3);background:rgba(255,255,255,.7);flex-shrink:0;margin-top:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.item.done .box{background:var(--accent);border-color:var(--accent)}
.item .blt{width:14px;flex-shrink:0;text-align:center;line-height:1.55;font-size:15px;user-select:none}
.item .txt{flex:1;font-size:15px}
.item.done .txt{text-decoration:line-through;opacity:.5}
.item.k-header .txt{font-weight:800;font-size:15.5px;letter-spacing:.01em;margin-top:6px}
.item[data-indent="1"]{margin-left:22px}.item[data-indent="2"]{margin-left:44px}.item[data-indent="3"]{margin-left:66px}
.expand{flex-shrink:0;margin-top:2px;width:20px;height:20px;border-radius:6px;display:none;align-items:center;justify-content:center;color:var(--accent);background:color-mix(in srgb,var(--accent) 16%,transparent)}
.item.has-note .expand{display:inline-flex}
.expand:hover{filter:brightness(.95)}

/* ---------- weekly grid ---------- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cell{border-radius:var(--radius);padding:12px 12px 4px;box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column}
.cell-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cell-clear{opacity:0;color:var(--ink-soft);padding:2px;border-radius:6px}
.cell:hover .cell-clear{opacity:.55}
.cell-clear:hover{opacity:1;color:#c0392b;background:rgba(0,0,0,.05)}
[data-theme="dark"] .cell-clear:hover{background:rgba(255,255,255,.08)}
.cell-name{font-weight:700;font-size:16.5px;flex:none}
.cell-date{font-size:11.5px;font-weight:600;color:rgba(0,0,0,.4);margin-left:6px;flex:1}
.itemlist{overflow-y:auto;flex:1;padding-right:2px;scrollbar-width:thin;cursor:text}
.itemlist::-webkit-scrollbar{width:5px}
.itemlist::-webkit-scrollbar-thumb{background:rgba(0,0,0,.13);border-radius:4px}
.cell-resize{height:16px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;touch-action:none;margin:0 -12px;flex-shrink:0}
.cell-resize::before{content:"";width:38px;height:4px;border-radius:4px;background:rgba(0,0,0,.16)}
.cell-resize:hover::before,.cell-resize.on::before{background:rgba(0,0,0,.35)}

/* ---------- thrilling ideas ---------- */
#ideaslaunch{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:30px}
#ideaslaunch:hover{border-color:var(--accent)}
#ideaslaunch .spark{width:38px;height:38px;border-radius:11px;background:color-mix(in srgb,var(--accent) 26%,white);display:flex;align-items:center;justify-content:center;color:var(--accent)}
#ideaslaunch .t{font-weight:700;font-size:16px}
#ideaslaunch .s{font-size:12.5px;color:var(--ink-soft)}
#ideaslaunch .go{margin-left:auto;color:var(--ink-soft)}
.backbtn{display:inline-flex;align-items:center;gap:7px;color:#fff;font-size:14px;font-weight:700;padding:9px 18px 9px 13px;margin-top:16px;margin-bottom:2px;border:none;border-radius:22px;background:var(--accent);box-shadow:0 3px 12px color-mix(in srgb,var(--accent) 40%,transparent);cursor:pointer}
.backbtn:hover{filter:brightness(1.06);transform:translateX(-2px);transition:transform .12s}
.backbtn svg{stroke:#fff}
.igroup{margin-bottom:26px}
.igroup-head{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.igroup-name{font-weight:700;font-size:16.5px;padding:2px 0;border-bottom:3px solid var(--grp-ink,var(--accent));color:var(--grp-ink,var(--ink))}
.igroup-tools{display:flex;gap:1px;opacity:0;transition:.15s;margin-left:auto}
.igroup:hover .igroup-tools,.igroup:hover>.igroup-head .draghandle{opacity:1}
.idea{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:7px;box-shadow:var(--shadow);overflow:hidden}
.idea-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}
.idea-arrow{color:var(--ink-soft);transition:transform .18s;flex-shrink:0;display:flex}
.idea.open .idea-arrow{transform:rotate(90deg)}
.idea-title{font-weight:600;flex:1;cursor:text}
.idea-tools{display:flex;gap:1px;opacity:0}
.idea:hover .idea-tools,.idea:hover .draghandle{opacity:1}
.idea-body{display:none;padding:2px 14px 12px 30px;color:#57544c;font-size:15px}
.idea.open .idea-body{display:block}
.ideabodylist{min-height:26px;cursor:text}
.addline{color:var(--ink-soft);font-size:14px;padding:8px 12px;border-radius:10px;width:100%;text-align:left}
.addline:hover{background:var(--line);color:var(--ink)}

#addsec{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
#addsec button{border:1px dashed var(--line);border-radius:10px;padding:8px 14px;font-size:13.5px;color:var(--ink-soft);background:var(--card)}
#addsec button:hover{color:var(--ink);border-color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(60,50,40,.28);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:#fff;border-radius:18px;padding:22px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:19px;margin-bottom:14px}
.modal h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:18px 0 8px}
.modal input[type=text]{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14.5px}
.chip-row{display:flex;gap:9px;flex-wrap:wrap}
.chip{width:30px;height:30px;border-radius:50%;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.chip.sel{outline:3px solid var(--ink);outline-offset:2px}
.bigbtn{display:flex;justify-content:center;width:100%;padding:10px;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:14.5px;margin-top:10px}
.ghostbtn{display:flex;justify-content:center;width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);font-weight:600;font-size:14px;margin-top:8px;color:var(--ink)}
.modal .close{position:sticky;float:right;color:var(--ink-soft);padding:2px}
.banner-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
#cropframe{height:150px;border-radius:10px;overflow:hidden;position:relative;cursor:grab;touch-action:none;background:var(--line);margin-top:6px;border:1px solid var(--line)}
#cropimg{position:absolute;inset:0;background-repeat:no-repeat;background-position:center;background-size:100%}
#cropframe::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 2px rgba(255,255,255,.5);border-radius:10px;pointer-events:none}
.banner-grid div{height:52px;border-radius:10px;cursor:pointer;background-size:cover;background-position:center}
.note-small{font-size:12.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
.switchrow{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.switch{width:40px;height:23px;border-radius:20px;background:#ddd6cb;position:relative;cursor:pointer;transition:.15s;flex-shrink:0}
.switch::after{content:"";position:absolute;top:2.5px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--accent)}
.switch.on::after{left:19px}
.sharetree{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:10px}
.sharetree .mainrow{font-weight:700;font-size:13.5px;margin:8px 0 4px}
.sharetree .subline{display:flex;align-items:center;gap:8px;padding:5px 0 5px 12px}
.sharetree .subline .nm{flex:1;font-size:14px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{padding:4px 9px;font-size:11.5px;font-weight:700;color:var(--ink-soft)}
.seg button.on{background:var(--accent);color:#fff}
#linkbox{position:fixed;z-index:80;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.15);padding:10px;display:flex;gap:6px}
#linkbox input{border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:13.5px;width:230px;font-family:inherit}
#linkbox button{background:var(--accent);color:#fff;border-radius:8px;padding:6px 12px;font-weight:700;font-size:13px}
.menu{position:fixed;z-index:80;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.15);padding:5px;min-width:150px}
.menu button{display:flex;width:100%;text-align:left;padding:8px 11px;border-radius:8px;font-size:13.5px;font-weight:600}
.menu button:hover{background:var(--line)}
#viewerbar{background:var(--brown);color:#fff;font-size:13px;padding:9px 16px;text-align:center}
#codegate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:auto}
.cg-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:32px 28px;max-width:400px;width:100%;text-align:center}
.cg-logo img{width:54px;height:54px;object-fit:contain;margin-bottom:8px}
.cg-card h2{font-size:22px;margin:4px 0 8px}
.cg-card p{color:var(--ink-soft);font-size:14px;line-height:1.5;margin:0 0 16px}
.cg-card input{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;text-align:center;margin-bottom:12px;background:var(--field);color:var(--ink)}
.cg-card input:focus{outline:none;border-color:var(--accent)}
.cg-primary{width:100%;padding:12px;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;font-size:15px;cursor:pointer;border:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cg-or{color:var(--ink-soft);font-size:12px;margin:14px 0;position:relative}
.cg-ghost{width:100%;padding:11px;border-radius:12px;background:var(--brown-soft);color:var(--ink);font-weight:700;font-size:14px;cursor:pointer;border:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cg-note{margin-top:14px !important;font-size:13px}
#viewertabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 20px 0;max-width:1060px;margin:0 auto}
.vtab{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:11px;background:var(--brown-soft);color:var(--ink);font-weight:700;font-size:14px;cursor:pointer;border:1.5px solid transparent}
.vtab:hover{background:color-mix(in srgb,var(--accent) 15%,var(--brown-soft))}
.vtab.active{background:var(--brown);color:#fff}
.version-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;margin-top:8px}
.version-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:var(--field)}
.version-row .v-when{display:flex;flex-direction:column;gap:1px;font-size:13.5px}
.version-row .v-kind{font-size:11px;color:var(--ink-soft)}
.version-row .v-restore{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;background:var(--brown-soft);color:var(--ink);font-weight:700;font-size:12.5px}
.version-row .v-restore:hover{background:var(--accent);color:#fff}
.item.item-sel{background:color-mix(in srgb,var(--accent) 22%,transparent);border-radius:7px}
.ideas-notepad{min-height:60vh}
#delselbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:80;background:var(--card);border:1px solid var(--line);box-shadow:0 6px 24px rgba(0,0,0,.16);border-radius:12px;padding:8px 10px 8px 16px;display:none;align-items:center;gap:10px;font-size:13.5px;font-weight:700}
#delselbar button{padding:6px 12px;border-radius:8px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:5px}
#delselbar #delselbtn{background:#c0392b;color:#fff}
#delselbar #delselx{background:var(--line);color:var(--ink)}
.vtab .ve{font-size:15px}
#ideas-line-btn{position:fixed;z-index:55;width:26px;height:26px;border-radius:7px;display:none;align-items:center;justify-content:center;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;opacity:.85}
#ideas-line-btn:hover{opacity:1;color:var(--accent)}
#ideas-line-btn.has{color:var(--accent);border-color:var(--accent);opacity:1}
.ideas-notepad>*.has-linenote{position:relative}
.ideas-notepad>*.has-linenote::after{content:"";position:absolute;right:-14px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--accent)}
.vegg{margin-left:auto;padding:5px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;opacity:.75;transition:.2s;background:transparent;cursor:pointer;border:none;flex-shrink:0}
.vegg:hover{opacity:1;transform:rotate(12deg) scale(1.08)}
.vegg img{width:26px;height:26px;object-fit:contain}
#creditegg .socials a{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;text-decoration:none}
#creditegg .socials .li{background:#0a66c2}#creditegg .socials .tg{background:#2aabee}#creditegg .socials .ig{background:radial-gradient(circle at 30% 110%,#fdd551,#fd5,#ff543e 40%,#c837ab 70%)}
#viewerbar button{color:#fff;text-decoration:underline;font-size:13px;margin-left:8px}
.ro [contenteditable]{pointer-events:none}
.credit{margin-top:64px;text-align:center;padding:34px 10px 6px;border-top:1px solid var(--line)}
.credit img{width:74px;height:auto;margin:0 auto 12px;display:block;opacity:.92}
.credit p{font-family:inherit;font-size:12px;line-height:1.65;color:var(--ink-soft);max-width:340px;margin:0 auto}
.credit .socials{display:flex;justify-content:center;gap:14px;margin-top:14px}
.credit .socials a{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;text-decoration:none}
.credit .socials .li{background:#0a66c2}.credit .socials .tg{background:#2aabee}.credit .socials .ig{background:radial-gradient(circle at 30% 110%,#fdd551,#fd5,#ff543e 40%,#c837ab 70%)}
@media print{
  #topbar,#addsec,.banner-btn,.sec-tools,.draghandle,.dl-del,.dl-add,.cell-resize,.addbtn,.expand,#viewerbar{display:none!important}
  body{background:#fff!important}
  #page{padding:0;max-width:100%}
  #banner{height:70px}
  .section,.cell,.idea,.dl-body,.tasks-body,.notes-body{break-inside:avoid;box-shadow:none}
  .grid{gap:8px}
  @page{margin:14mm}
}
@media(max-width:560px){
  #tabtitle{font-size:26px}
  .grid{gap:9px;grid-template-columns:1fr}
  .cell{padding:9px 9px 2px}
  #banner{height:auto;aspect-ratio:1060/150}
  .sec-tools,.igroup-tools,.idea-tools,.tabdel,.draghandle{opacity:.45}
  /* content fonts match laptop on mobile (default 15) */
  /* deadlines: reclaim space for the task name */
  .dl-row{gap:5px;padding:5px 4px}
  .dl-due{width:58px;padding:4px 3px;font-size:10.5px;margin-left:auto}
  .dl-tag{font-size:8px;padding:2px 5px;letter-spacing:0}
  .dl-tag .tg-full{display:none}
  .dl-tag .tg-short{display:inline}
  .dl-row .draghandle{display:none}
  .dl-row .dl-del{display:none}
  /* section headers on one line: smaller, tighter */
  .sec-title{font-size:16px!important}
  .sec-title::after{width:34px;height:3px}
  /* toolbar sticks to the top after you scroll past the tabs (Google-Docs style) */
  #toolbar{padding:6px 10px;gap:1px;justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  #toolbar::-webkit-scrollbar{display:none}
  #toolbar>button{padding:5px 6px;font-size:12.5px;flex-shrink:0}
  #toolbar .sep{margin:0 3px}
  #fssize{min-width:20px;font-size:11px}
  /* table toolbar: compact bar pinned to the bottom so it doesn't cover the table */
  #tablebar{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%;max-width:100%;max-height:132px;border-radius:14px 14px 0 0;padding:7px 9px;gap:5px}
  #tablebar button{font-size:11px;padding:5px 7px}
  #tablebar .grp{gap:3px}
  #tablebar #tblselinfo{font-size:9px;width:100%}
  #imgbar{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%;max-width:100%;border-radius:14px 14px 0 0}
}
</style>
</head>
<body>
<div id="viewerbar" style="display:none"></div>
<div id="topbar">

/* lighten/adjust any hex or rgb colour for readability on a dark background */
function toRGB(col){
  if(!col)return null;
  col=col.trim();
  let m=col.match(/^#([0-9a-f]{3})$/i);if(m){const h=m[1];return[parseInt(h[0]+h[0],16),parseInt(h[1]+h[1],16),parseInt(h[2]+h[2],16)]}
  m=col.match(/^#([0-9a-f]{6})$/i);if(m){return[parseInt(m[1].slice(0,2),16),parseInt(m[1].slice(2,4),16),parseInt(m[1].slice(4,6),16)]}
  m=col.match(/rgba?\(([^)]+)\)/i);if(m){const p=m[1].split(",").map(x=>parseFloat(x));return[p[0],p[1],p[2]]}
  return null;
}
function relLum(r,g,b){return 0.2126*r+0.7152*g+0.0722*b}
/* returns a dark-mode-friendly version: dark colours get lightened, hue preserved */
function darkModeColor(col){
  const rgb=toRGB(col);if(!rgb)return col;
  let[r,g,b]=rgb;
  const lum=relLum(r,g,b);
  if(lum>150)return col; /* already light enough */
  /* mix toward white until it's bright enough, keeping hue */
  const target=185;const factor=Math.min(1,(target-lum)/ (255-lum) *1.15);
  r=Math.round(r+(255-r)*factor);g=Math.round(g+(255-g)*factor);b=Math.round(b+(255-b)*factor);
  return `rgb(${r},${g},${b})`;
}

/* ---- frictionless deadline date parsing: "3/7", "15/8", "tmr", "mon", "in 3 days", "next fri" ---- */
function parseDue(str){
  if(!str)return "";
  str=str.trim().toLowerCase().replace(/\s+/g," ");
  const today=new Date();today.setHours(0,0,0,0);
  const iso=d=>{d.setHours(0,0,0,0);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
  if(/^(today|tdy|tod)$/.test(str))return iso(today);
  /* repeated tomorrow: "tmr", "tmr tmr" (=+2), "tmr tmr tmr" (=+3), etc. */
  const tmrTokens=str.split(" ");
  if(tmrTokens.length&&tmrTokens.every(t=>/^(tmr|tmrw|tom|tomorrow)$/.test(t))){
    const d=new Date(today);d.setDate(d.getDate()+tmrTokens.length);return iso(d);
  }
  let m=str.match(/^in (\d+) ?(d|day|days|w|week|weeks|mo|month|months)$/);
  if(m){const n=+m[1];const d=new Date(today);if(/mo|month/.test(m[2]))d.setMonth(d.getMonth()+n);else d.setDate(d.getDate()+(/w/.test(m[2])?n*7:n));return iso(d)}

  const dayAliases={sun:0,sunday:0,mon:1,monday:1,tue:2,tues:2,tuesday:2,wed:3,weds:3,wednesday:3,thu:4,thur:4,thurs:4,thursday:4,fri:5,friday:5,sat:6,saturday:6};
  /* [this|next|next next ...] <weekday> — "this fri" = the coming Friday; each "next" adds a week */
  m=str.match(/^((?:(?:next|nxt) )*)(?:(this|coming) )?((?:next|nxt) )*([a-z]+)$/);
  if(m&&dayAliases[m[4]]!==undefined){
    const nextCount=(str.match(/\b(next|nxt)\b/g)||[]).length;
    const target=dayAliases[m[4]];
    let d=new Date(today);
    let diff=(target-d.getDay()+7)%7;
    if(diff===0)diff=7; /* bare/"this" weekday means the next occurrence, not today */
    d.setDate(d.getDate()+diff+nextCount*7);
    return iso(d);
  }
  /* end of week (this Sunday) / end of month */
  if(/^(eow|end of (the )?week)$/.test(str)){let d=new Date(today);let diff=(0-d.getDay()+7)%7;if(diff===0)diff=7;d.setDate(d.getDate()+diff);return iso(d)}
  if(/^(eom|end of (the )?month)$/.test(str)){const d=new Date(today.getFullYear(),today.getMonth()+1,0);return iso(d)}
  if(/^next week$/.test(str)){const d=new Date(today);d.setDate(d.getDate()+7);return iso(d)}
  if(/^next month$/.test(str)){const d=new Date(today.getFullYear(),today.getMonth()+1,today.getDate());return iso(d)}
  /* d/m or d/m/yy or d/m/yyyy */
  m=str.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?$/);
  if(m){let dd=+m[1],mm=+m[2],yy=m[3]?+m[3]:today.getFullYear();if(yy<100)yy+=2000;
    let d=new Date(yy,mm-1,dd);
    if(!m[3]&&d<today)d=new Date(yy+1,mm-1,dd);
    if(!isNaN(d))return iso(d)}
  /* just a day number -> this or next month */
  m=str.match(/^(\d{1,2})$/);
  if(m){let dd=+m[1];let d=new Date(today.getFullYear(),today.getMonth(),dd);if(d<today)d=new Date(today.getFullYear(),today.getMonth()+1,dd);return iso(d)}
  return null;
}

function showCodeGate(){

  document.getElementById("banner").style.display="none";
  const g=document.createElement("div");g.id="codegate";
  g.innerHTML=`
    <div class="cg-card">
      <div class="cg-logo"><img src="${window.LOGO_B64}" alt="logo"></div>
      <h2 id="cg-title">Welcome back</h2>
      <p id="cg-sub">Log in to open your planner. Same login on any device keeps everything in sync.</p>
      <input id="cg-user" placeholder="username" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
      <input id="cg-pass" type="password" placeholder="password" autocomplete="off">
      <input id="cg-pass2" type="password" placeholder="confirm password" autocomplete="off" style="display:none">
      <button class="cg-primary" id="cg-go" type="button">Log in</button>
      <div class="cg-or">or</div>
      <button class="cg-ghost" id="cg-switch" type="button">Create a new account</button>
      <p class="cg-note" id="cg-msg"></p>
    </div>`;
  document.body.appendChild(g);
  const msg=g.querySelector("#cg-msg");
  const goBtn=g.querySelector("#cg-go");
  let mode="login",busy=false;
  const setMode=(m)=>{
    mode=m;
    g.querySelector("#cg-title").textContent=m==="login"?"Welcome back":"Create your account";
    g.querySelector("#cg-sub").textContent=m==="login"?"Log in to open your planner. Same login on any device keeps everything in sync.":"Pick a username and password. You'll use these to open your planner on any device.";
    g.querySelector("#cg-pass2").style.display=m==="login"?"none":"";
    goBtn.textContent=m==="login"?"Log in":"Create account";
    g.querySelector("#cg-switch").textContent=m==="login"?"Create a new account":"I already have an account";
    msg.textContent="";
  };
  const doGo=async(ev)=>{
    if(ev){ev.preventDefault();ev.stopPropagation();}
    if(busy)return;
    try{
    const user=g.querySelector("#cg-user").value.trim();
    const pass=g.querySelector("#cg-pass").value;
    if(!user||!pass){msg.textContent="Enter a username and password.";return}
    if(mode==="signup"){
      const pass2=g.querySelector("#cg-pass2").value;
      if(pass!==pass2){msg.textContent="Passwords don't match.";return}
      if(pass.length<4){msg.textContent="Use a password of at least 4 characters.";return}
    }

      if(!cloud){busy=false;setMode("login");msg.innerHTML="No account found with that username. Want to <b>create a new account</b> instead?";return}
      if(!cloud.auth||cloud.auth!==hashPw(pass)){busy=false;setMode("login");msg.textContent="Wrong password. Try again.";return}
      try{await store.set(KEY,JSON.stringify(cloud))}catch(e){}
      finishLoadFrom(cloud);
    }else{
      if(cloud){busy=false;setMode("signup");msg.textContent="That username is taken. Pick another, or log in.";return}
      let existing=null;
      try{const r=await store.get(KEY);if(r&&r.value)existing=JSON.parse(r.value)}catch(e){}
      S=existing?migrateAny(existing):defaultState();
      S.auth=hashPw(pass);S.username=user;
      try{await cloudSavePlanner()}catch(e){}
      try{await store.set(KEY,JSON.stringify(S))}catch(e){}
      finishLoadFrom(null);
    }
    }catch(err){busy=false;setMode(mode);msg.textContent="Error: "+(err&&err.message?err.message:err);}
  };

  window.gateSwitch=()=>setMode(mode==="login"?"signup":"login");

  /* simplest, most reliable binding: direct onclick property */
  goBtn.onclick=(e)=>{if(e)e.preventDefault();doGo(e);};
  switchBtn.onclick=(e)=>{if(e)e.preventDefault();window.gateSwitch();};

  g.querySelector("#cg-user").addEventListener("keydown",e=>{if(e.key==="Enter")doGo(e)});

function deleteItemsByIds(ids){

/* ================= lookups (work on S, or sharedRef in viewer) ================= */
function eachSection(fn){
  if(viewer){(sharedRef.mains||[]).forEach(m=>(m.subs||[]).forEach(sub=>{
    if(sub.project)(sub.project.detailSections||[]).forEach(fn);
    (sub.sections||[]).forEach(fn);
  }));return}
  S.mains.forEach(m=>m.subs.forEach(sub=>{
    if(sub.project)(sub.project.detailSections||[]).forEach(fn);
    sub.sections.forEach(fn);
  }));
}
function eachIdea(fn){for(const g of S.ideas.groups)for(const it of g.items)fn(it)}
function listById(id){
  let out=null;
  eachSection(sec=>{if(sec.type==="tasks"&&sec.id===id)out=sec.items;if(sec.type==="grid")sec.cells.forEach(c=>{if(c.id===id)out=c.items})});
  if(!out)eachIdea(it=>{if(it.id===id)out=it.items;if(it.detail)it.detail.forEach(sec=>{if(sec.type==="tasks"&&sec.id===id)out=sec.items;if(sec.type==="grid")sec.cells.forEach(c=>{if(c.id===id)out=c.items})})});
  return out;
}
function itemHome(id){
  let out=null;
  eachSection(sec=>{
    if(sec.type==="tasks"){const i=sec.items.findIndex(x=>x.id===id);if(i>-1)out={arr:sec.items,idx:i}}
    if(sec.type==="grid")sec.cells.forEach(c=>{const i=c.items.findIndex(x=>x.id===id);if(i>-1)out={arr:c.items,idx:i}});
  });
  if(!out)eachIdea(it=>{
    const i=it.items.findIndex(x=>x.id===id);if(i>-1)out={arr:it.items,idx:i};
    if(it.detail)it.detail.forEach(sec=>{
      if(sec.type==="tasks"){const j=sec.items.findIndex(x=>x.id===id);if(j>-1)out={arr:sec.items,idx:j}}
      if(sec.type==="grid")sec.cells.forEach(c=>{const j=c.items.findIndex(x=>x.id===id);if(j>-1)out={arr:c.items,idx:j}});
    });
  });
  return out;
}
function ideaHome(id){for(const g of S.ideas.groups){const i=g.items.findIndex(x=>x.id===id);if(i>-1)return{arr:g.items,idx:i}}return null}
function byId2Idea(id){for(const g of S.ideas.groups)for(const it of g.items)if(it.id===id)return it;return null}
function curSecHost(){
  if(ideaDetailView){const idea=byId2Idea(ideaDetailView);return idea?idea.detail:null}
  if(detailView)return activeSub().project.detailSections;
  return activeSub().sections;
}
function curDetailSections(){return detailView?activeSub().project.detailSections:null}

/* ================= input sync ================= */
function restoreLightColors(clone){
  /* if we're in dark mode, swap any dark-adjusted colour back to its stored light value before saving */
  clone.querySelectorAll("[data-lc]").forEach(el=>{el.style.color=el.dataset.lc;el.removeAttribute("data-lc")});
  return clone;
}
function stripTableUI(clone){
  clone.querySelectorAll(".rz-col,.rz-row").forEach(h=>h.remove());
  clone.querySelectorAll(".line-note-btn").forEach(h=>h.remove());
  clone.querySelectorAll(".cell-sel").forEach(c=>c.classList.remove("cell-sel"));
  clone.querySelectorAll("table.tbl-active").forEach(t=>t.classList.remove("tbl-active"));
  clone.querySelectorAll("img.img-selected").forEach(i=>i.classList.remove("img-selected"));
  clone.querySelectorAll("td").forEach(td=>{if(!td.getAttribute("class"))td.removeAttribute("class")});
  return clone;
}
function serializeHTML(el){
  const clone=el.cloneNode(true);
  stripTableUI(clone);
  restoreLightColors(clone);
  return clone.innerHTML;
}
function cleanNoteHTML(el){
  const clone=el.cloneNode(true);
  stripTableUI(clone);
  restoreLightColors(clone);
  /* remove zero-width caret spaces from empty lines, but keep them if that's the only content of a line */
  clone.querySelectorAll(".ck-txt").forEach(t=>{if(t.textContent==="\u200B")t.textContent="";});
  return clone.innerHTML.replace(/\u200B(?=.)/g,"");
}
document.addEventListener("input",e=>{
  const el=e.target.closest?e.target.closest("[data-sync]"):null;
  if(el){
    const[kind,id]=el.dataset.sync.split(":");
    if(kind==="ideasnotes"){S.ideas.notesHtml=cleanNoteHTML(el);setTimeout(()=>markLinesWithNotes(el),0);saveTyping();return}
    const o=byId[id];
    if(o){
      if(kind==="item")o.html=serializeHTML(el);
      if(kind==="cellname")o.name=el.textContent;
      if(kind==="ideatitle")o.title=el.textContent;
      if(kind==="sectitle")o.title=el.textContent;
      if(kind==="notes")o.html=el.classList.contains("richnote")?cleanNoteHTML(el):serializeHTML(el);
      if(kind==="groupname")o.name=el.textContent;
      if(kind==="itemnote")o.note=serializeHTML(el);
      if(kind==="dltask")o.html=el.innerHTML;
    }
    saveTyping();
  }
  if(e.target.id==="tabtitle"&&!viewer){
    if(e.target.dataset.mode==="ideas"){S.ideas.title=e.target.textContent}
    else if(e.target.dataset.mode==="tab"){activeSub().name=e.target.textContent;renderNav()}
    saveTyping();
  }
});
function armed(btn,label,fn){
  if(btn.dataset.armed){fn()}
  else{btn.dataset.armed="1";btn.classList.add("armed");const old=btn.innerHTML;btn.innerHTML=label;
    setTimeout(()=>{if(btn.isConnected){btn.dataset.armed="";btn.classList.remove("armed");btn.innerHTML=old}},2000)}
}
function openPalette(anchor,mode,onPick){
  closePalettes();
  const cols=mode==="cell"?PASTELS:SECCOLORS.map(c=>c.ink);
  const p=document.createElement("div");p.className="palette";
  cols.forEach(col=>{const d=document.createElement("div");d.style.background=col;d.onclick=ev=>{ev.stopPropagation();onPick(col);closePalettes()};p.appendChild(d)});
  const clr=document.createElement("div");clr.className="clr";clr.textContent="no colour";clr.onclick=ev=>{ev.stopPropagation();onPick(null);closePalettes()};p.appendChild(clr);
  document.body.appendChild(p);
  const r=anchor.getBoundingClientRect();placePopup(p,r);
  setTimeout(()=>document.addEventListener("click",closePalettes,{once:true}),0);
}

/* position a floating element just below an anchor, but never off-screen (flip above / clamp) */
function placePopup(el,anchorRect,gap){
  gap=gap==null?6:gap;
  const w=el.offsetWidth||200, h=el.offsetHeight||160, pad=8;
  let left=Math.min(Math.max(pad,anchorRect.left),innerWidth-w-pad);
  if(left<pad)left=pad;
  let top=anchorRect.bottom+gap;
  if(top+h>innerHeight-pad){
    const above=anchorRect.top-h-gap;
    top=above>=pad?above:Math.max(pad,innerHeight-h-pad);
  }
  el.style.left=left+"px";el.style.top=top+"px";
}

  m.innerHTML=
    opt("note",(hasNote?"Edit note":"Add note")+" ")+
    `<div style="height:1px;background:var(--line);margin:4px 6px"></div>`+
    opt("todo","Make checkbox")+opt("bullet","Make bullet")+opt("header","Make header")+opt("text","Make plain text")+
    `<div style="height:1px;background:var(--line);margin:4px 6px"></div>`+
    opt("del","Delete line");

    it.kind=act;if(act!=="todo")it.done=false;(viewer?renderViewer(sharedRef):renderPage());saveSoon();
  });

}

function openNoteModal(itemId){
  const it=byId[itemId];if(!it)return;
  const m=modal(`<h2>Elaboration</h2><p class="note-small" style="margin-top:-6px">Notes for: <b>${escHtml((it.html||"this item").replace(/<[^>]+>/g,""))||"this item"}</b></p>
    <div class="notes-body richnote rich-host richdrop" contenteditable id="noteedit" data-ph="Type all the extra detail here — checkboxes, tables, links and images all work. This stays tucked away behind the icon." style="margin-top:12px">${it.note||""}</div>
    <button class="ghostbtn" id="notedel" style="color:#c96a6a;margin-top:12px">${icon("trash",14)} Delete this note</button>`);
  const ed=m.querySelector("#noteedit");
  upgradeCheckboxes(ed);
  setTimeout(()=>ed.focus(),50);
  const refresh=()=>{const row=document.querySelector(`[data-item="${itemId}"]`);if(row){const has=(it.note||"").replace(/<[^>]+>/g,"").trim();row.classList.toggle("has-note",!!has)}};
  ed.addEventListener("input",()=>{it.note=cleanNoteHTML(ed);refresh();saveSoon();});
  m.querySelector("#notedel").onclick=()=>{
    const del=m.querySelector("#notedel");
    if(del.dataset.armed){it.note="";refresh();saveSoon();closeModal()}
    else{del.dataset.armed="1";del.innerHTML=icon("trash",14)+" Click again to delete";setTimeout(()=>{if(del.isConnected){del.dataset.armed="";del.innerHTML=icon("trash",14)+" Delete this note"}},2000)}
  };
}
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="z"){
    if(viewer)return;
    e.preventDefault();
    if(e.shiftKey)doRedo();else doUndo();
  }else if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="y"){
    if(viewer)return;e.preventDefault();doRedo();
  }else if((e.metaKey||e.ctrlKey)&&e.shiftKey&&(e.key==="["||e.key==="]"||e.code==="BracketLeft"||e.code==="BracketRight")){
    if(viewer)return;e.preventDefault();
    /* switch between sub-tabs in the current main tab */
    const subs=activeMain().subs;
    if(subs.length<2)return;

function compressImage(file,cb){
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();img.onload=()=>{
    const max=900;let w=img.width,h=img.height;if(w>max){h=h*max/w;w=max}
    const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",0.72));};img.src=rd.result};
  rd.readAsDataURL(file);
}

/* ================= rich note editor behaviors ================= */
/* ============================================================
   NOTES EDITOR — checkbox lines, bullets, headers, indent
   Clean rebuild. Key design decisions that make it reliable:
   - A checkbox line is: <div class="ck-line"><input class="ck"><span class="ck-txt">TEXT</span></div>
   - The text ALWAYS lives inside .ck-txt. After every keystroke we run a
     "repair" pass that pulls any stray text (that the browser dropped as a
     direct child of .ck-line, next to the input) back into .ck-txt. This is
     what stops text vanishing or Enter wiping the line.
   ============================================================ */
function caretLineText(){
  const s=getSelection();if(!s.rangeCount)return null;
  const r=s.getRangeAt(0);if(!r.collapsed)return null;
  const n=r.startContainer;if(n.nodeType!==3)return{node:null,text:"",offset:r.startOffset};
  return{node:n,text:n.textContent.slice(0,r.startOffset),offset:r.startOffset};
}
function newCkLineEl(indentFrom){
  const div=document.createElement("div");div.className="ck-line";div.setAttribute("data-ck","1");
  const inp=document.createElement("input");inp.type="checkbox";inp.className="ck";inp.setAttribute("contenteditable","false");
  const txt=document.createElement("span");txt.className="ck-txt";
  txt.appendChild(document.createTextNode("\u200B"));/* zero-width space: gives the caret a real spot to land & blink */
  div.appendChild(inp);div.appendChild(txt);
  if(indentFrom&&indentFrom.dataset&&indentFrom.dataset.indent){div.dataset.indent=indentFrom.dataset.indent;div.style.marginLeft=indentFrom.style.marginLeft}
  return div;
}
/* pull any text that the browser parked directly inside .ck-line (outside .ck-txt) back into .ck-txt */
function repairCkLine(line){
  if(!line||!line.classList||!line.classList.contains("ck-line"))return;
  let txt=line.querySelector(".ck-txt");
  if(!txt){txt=document.createElement("span");txt.className="ck-txt";line.appendChild(txt)}
  /* move any stray nodes (not the input, not the ck-txt) into ck-txt, in order */
  [...line.childNodes].forEach(node=>{
    if(node===txt)return;
    if(node.nodeType===1&&node.classList&&node.classList.contains("ck"))return; /* the checkbox */
    txt.appendChild(node);
  });
}
function upgradeCheckboxes(host){
  /* convert legacy <span class="ck"> checkboxes (with .on state) to native inputs, and repair structure */
  host.querySelectorAll(".ck-line").forEach(line=>{
    const oldSpan=line.querySelector("span.ck");
    if(oldSpan){
      const inp=document.createElement("input");inp.type="checkbox";inp.className="ck";inp.setAttribute("contenteditable","false");
      if(line.classList.contains("on")){inp.checked=true;inp.setAttribute("checked","")}
      oldSpan.replaceWith(inp);
      line.classList.remove("on");
    }
    if(!line.querySelector("input.ck")){
      const inp=document.createElement("input");inp.type="checkbox";inp.className="ck";inp.setAttribute("contenteditable","false");
      line.insertBefore(inp,line.firstChild);
    }
    repairCkLine(line);

function currentCkLine(){
  const s=getSelection();if(!s.rangeCount)return null;
  let n=s.getRangeAt(0).startContainer;
  n=n.nodeType===1?n:n.parentElement;
  return n&&n.closest?n.closest(".ck-line"):null;
}
function ensureCaretSpot(el){
  /* make sure the ck-txt has a text node with a zero-width space for the caret */
  if(el&&el.classList&&el.classList.contains("ck-txt")){

  }

  const tn=el.firstChild&&el.firstChild.nodeType===3?el.firstChild:null;
  if(tn&&tn.textContent==="\u200B"){r.setStart(tn,1);r.collapse(true)}

/* turn the current line into a checkbox line, keeping any text already typed */
function makeCheckboxLine(rn){

  const div=newCkLineEl();
  const txt=div.querySelector(".ck-txt");
  if(line&&line!==rn&&rn.contains(line)){

    if(line.tagName==="LI"){
      while(line.firstChild)txt.appendChild(line.firstChild);

function currentNoteLine(rn){

document.addEventListener("keydown",e=>{
  const rn=e.target.closest?e.target.closest(".richnote"):null;if(!rn)return;
  const ckline=currentCkLine();

    if(r&&r.collapsed){
      const atStart=r.startOffset===0&&(r.startContainer===txt||r.startContainer===txt.firstChild||txt.childNodes.length===0);
      let atEnd=false;
      try{const probe=document.createRange();probe.selectNodeContents(txt);probe.setStart(r.endContainer,r.endOffset);atEnd=probe.toString().length===0;}catch(_){}
      if(e.key==="ArrowUp"&&atStart){
        const prev=ckline.previousElementSibling;
        if(prev){e.preventDefault();const t=prev.classList&&prev.classList.contains("ck-line")?prev.querySelector(".ck-txt"):prev;placeCaretEnd(t||prev);return;}
      }
      if(e.key==="ArrowDown"&&atEnd){
        const next=ckline.nextElementSibling;
        if(next){e.preventDefault();const t=next.classList&&next.classList.contains("ck-line")?next.querySelector(".ck-txt"):next;placeCaret(t||next);return;}
      }
    }
  }
  if(e.key==="Enter"&&ckline){
    e.preventDefault();
    repairCkLine(ckline);
    const txt=ckline.querySelector(".ck-txt");
    const empty=!txt||txt.textContent.replace(/\u200B/g,"").trim()==="";
    const sel=getSelection();const r=sel.rangeCount?sel.getRangeAt(0):null;
    const atStart=r&&r.collapsed&&r.startOffset===0&&(r.startContainer===txt||r.startContainer===txt.firstChild||txt.childNodes.length===0);
    if(empty){
      /* Enter on an empty checkbox exits to a normal paragraph */
      const p=document.createElement("div");p.innerHTML="<br>";
      ckline.replaceWith(p);placeCaret(p);
    }else if(atStart){
      /* Enter at the very start: insert an empty checkbox line ABOVE, keep caret on current text */
      const div=newCkLineEl(ckline);
      ckline.before(div);
      placeCaret(txt);
    }else{
      /* split at the caret: text after the caret moves to a new line below */
      const after=document.createRange();
      after.selectNodeContents(txt);
      try{after.setStart(r.endContainer,r.endOffset)}catch(_){}
      const moved=after.extractContents();
      const div=newCkLineEl(ckline);
      const ntxt=div.querySelector(".ck-txt");
      /* newCkLineEl already gives ntxt an empty text node; append any moved content after it */
      if(moved&&moved.textContent)ntxt.appendChild(moved);
      ckline.after(div);
      placeCaret(ntxt);
    }
    rn.dispatchEvent(new Event("input",{bubbles:true}));
    return;
  }
  if(e.key==="Backspace"&&ckline){
    const txt=ckline.querySelector(".ck-txt");
    const s=getSelection();const r=s.rangeCount?s.getRangeAt(0):null;
    const caretAtStart=r&&r.collapsed&&r.startOffset===0&&(r.startContainer===txt||r.startContainer===txt.firstChild||(txt.firstChild===null));
    const empty=!txt||txt.textContent.replace(/\u200B/g,"")==="";
    if(empty||caretAtStart){
      e.preventDefault();
      const p=document.createElement("div");
      if(txt&&txt.childNodes.length){while(txt.firstChild)p.appendChild(txt.firstChild)}else{p.innerHTML="<br>"}
      ckline.replaceWith(p);placeCaret(p);
      rn.dispatchEvent(new Event("input",{bubbles:true}));
      return;
    }
  }
  if(e.key==="Enter"&&!ckline){setTimeout(()=>autoLink(rn),0)}
});
/* after any input in a checkbox line, repair its structure so stray text can't escape .ck-txt */

function autoLink(rn){
  const b=caretLineText();if(!b||!b.node)return;
  const m=b.text.match(/(^|\s)((https?:\/\/|www\.)[^\s]+)$/i);
  if(!m)return;
  const url=m[2];const start=b.offset-url.length;
  let p=b.node.parentElement;while(p&&p!==rn){if(p.tagName==="A")return;p=p.parentElement}
  const range=document.createRange();
  try{range.setStart(b.node,start);range.setEnd(b.node,b.offset)}catch(_){return}
  const s=getSelection();s.removeAllRanges();s.addRange(range);
  const href=/^https?:\/\//i.test(url)?url:"https://"+url;
  document.execCommand("createLink",false,href);

  s.collapseToEnd();
  rn.dispatchEvent(new Event("input",{bubbles:true}));
}

/* ================= tables: selection, resize, persistent toolbar ================= */
let selCells=[], selAnchor=null, selDragging=false, curTable=null, justDragSelected=false;

function cellsOf(tbl){const out=[];[...tbl.rows].forEach((r,ri)=>[...r.cells].forEach((c,ci)=>out.push({c,ri,ci})));return out}
function cellPos(td){const tr=td.parentElement;return{ri:[...tr.parentElement.children].indexOf(tr),ci:[...tr.children].indexOf(td)}}
function clearCellSel(){document.querySelectorAll("td.cell-sel").forEach(c=>c.classList.remove("cell-sel"));selCells=[]}
function markSel(cells){clearCellSel();selCells=cells;cells.forEach(c=>c.classList.add("cell-sel"))}
function rectSelect(tbl,a,b){
  const pa=cellPos(a),pb=cellPos(b);
  const r0=Math.min(pa.ri,pb.ri),r1=Math.max(pa.ri,pb.ri),c0=Math.min(pa.ci,pb.ci),c1=Math.max(pa.ci,pb.ci);
  const out=[];
  [...tbl.rows].forEach((r,ri)=>{if(ri<r0||ri>r1)return;[...r.cells].forEach((c,ci)=>{if(ci>=c0&&ci<=c1)out.push(c)})});
  return out;
}
/* pointer selection: press in a cell, drag across others to select a block */
document.addEventListener("pointerdown",e=>{
  const td=e.target.closest(".rich-host td");
  if(!td)return;
  if(e.target.classList.contains("rz-col")||e.target.classList.contains("rz-row"))return;
  curTable=td.closest("table");selAnchor=td;selDragging=true;justDragSelected=false;
  /* shift-click extends from the existing anchor/first selected cell */
  if(e.shiftKey&&selCells.length){e.preventDefault();markSel(rectSelect(curTable,selCells[0]||td,td));justDragSelected=true}
},true);
document.addEventListener("pointermove",e=>{
  if(!selDragging||!selAnchor)return;
  /* find the cell under the pointer (pointermove target can be a child node) */
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const td=el&&el.closest?el.closest(".rich-host td"):null;
  if(!td||td.closest("table")!==curTable)return;
  if(td!==selAnchor){
    e.preventDefault();
    justDragSelected=true;
    document.body.classList.add("celldrag");
    const s=getSelection();if(s&&s.removeAllRanges)s.removeAllRanges();
    markSel(rectSelect(curTable,selAnchor,td));
  }
});
document.addEventListener("pointerup",()=>{selDragging=false;document.body.classList.remove("celldrag")});

document.addEventListener("selectstart",e=>{if(selDragging&&justDragSelected)e.preventDefault()});

/* main click: manage toolbar + activate table (but DON'T reset a multi-cell drag selection) */
document.addEventListener("click",e=>{
  const inBar=e.target.closest("#tablebar");

    if(!justDragSelected){

function ensureResizeHandles(tbl){
  /* every cell gets a right-edge (column) handle and a bottom-edge (row) handle,
     so you can grab the edge of whichever cell you're looking at */
  tbl.querySelectorAll(".rz-col,.rz-row").forEach(h=>h.remove());
  [...tbl.rows].forEach(r=>[...r.cells].forEach(c=>{
    const hc=document.createElement("span");hc.className="rz-col";hc.contentEditable="false";c.appendChild(hc);
    const hr=document.createElement("span");hr.className="rz-row";hr.contentEditable="false";c.appendChild(hr);
  }));
}
/* column/row resize via handle drag */
let rzInfo=null;
document.addEventListener("pointerdown",e=>{
  const h=e.target;
  if(h.classList&&h.classList.contains("rz-col")){
    e.preventDefault();e.stopPropagation();
    const td=h.closest("td");const tbl=td.closest("table");const ci=cellPos(td).ci;
    /* columns that move together: all selected columns, if this handle's column is one of them */
    let cols=[ci];
    if(selCells.length>1){
      const selCols=[...new Set(selCells.map(c=>cellPos(c).ci))];
      if(selCols.includes(ci))cols=selCols;
    }
    const starts={};cols.forEach(c=>{const cell=tbl.rows[0].cells[c];starts[c]=cell?cell.getBoundingClientRect().width:80});
    rzInfo={type:"col",tbl,cols,starts,startX:e.clientX,base:ci};
    h.setPointerCapture(e.pointerId);
  }else if(h.classList&&h.classList.contains("rz-row")){
    e.preventDefault();e.stopPropagation();
    const td=h.closest("td");const tr=td.parentElement;const tbl=tr.closest("table");
    /* rows that move together: all selected rows, if this handle's row is one of them */
    let rows=[tr];
    if(selCells.length>1){
      const selRows=[...new Set(selCells.map(c=>c.parentElement))];
      if(selRows.includes(tr))rows=selRows;
    }
    const starts=new Map();rows.forEach(r=>starts.set(r,r.getBoundingClientRect().height));
    rzInfo={type:"row",tbl,rows,starts,startY:e.clientY,base:tr};
    h.setPointerCapture(e.pointerId);
  }
},true);
document.addEventListener("pointermove",e=>{
  if(!rzInfo)return;
  if(rzInfo.type==="col"){
    const dx=e.clientX-rzInfo.startX;
    /* Excel-style: all selected columns get the SAME width (based on the dragged column) */
    const w=Math.max(40,rzInfo.starts[rzInfo.base]+dx);
    rzInfo.cols.forEach(ci=>{
      [...rzInfo.tbl.rows].forEach(r=>{const c=r.cells[ci];if(c)c.style.width=w+"px"});
    });
  }else{
    const dy=e.clientY-rzInfo.startY;
    /* Excel-style: all selected rows get the SAME height */
    const hgt=Math.max(24,rzInfo.starts.get(rzInfo.base)+dy);
    rzInfo.rows.forEach(r=>{
      r.style.height=hgt+"px";
      [...r.cells].forEach(c=>c.style.height=hgt+"px");
    });
  }
});

  if(rzInfo){const tbl=rzInfo.tbl;const rn=tbl&&tbl.closest(".rich-host");if(rn)rn.dispatchEvent(new Event("input",{bubbles:true}));rzInfo=null}
