function updateSelInfo(){const el=document.getElementById("tblselinfo");if(el)el.textContent=selCells.length>1?`${selCells.length} cells selected — actions apply to all`:"tip: shift-click or drag to select multiple cells"}
/* build a virtual grid: grid[r][c] = the td occupying that visual position (accounts for existing spans) */
function buildGridMap(tbl){
  const grid=[];
  [...tbl.rows].forEach((tr,r)=>{
    grid[r]=grid[r]||[];
    let c=0;
    [...tr.cells].forEach(td=>{
      while(grid[r][c])c++; /* skip positions filled by a rowspan from above */
      const cs=parseInt(td.getAttribute("colspan")||"1");
      const rs=parseInt(td.getAttribute("rowspan")||"1");
      for(let dr=0;dr<rs;dr++)for(let dc=0;dc<cs;dc++){
        grid[r+dr]=grid[r+dr]||[];
        grid[r+dr][c+dc]=td;
      }
      c+=cs;
    });
  });
  return grid;
}
function cellBounds(grid,td){
  let minR=1e9,maxR=-1,minC=1e9,maxC=-1;
  grid.forEach((row,r)=>row.forEach((cell,c)=>{if(cell===td){minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c)}}));
  return{minR,maxR,minC,maxC};
}
function mergeCells(tbl,sel){
  if(sel.length<2){return}
  const grid=buildGridMap(tbl);
  /* find the rectangle covering all selected cells */
  let minR=1e9,maxR=-1,minC=1e9,maxC=-1;
  sel.forEach(td=>{const b=cellBounds(grid,td);minR=Math.min(minR,b.minR);maxR=Math.max(maxR,b.maxR);minC=Math.min(minC,b.minC);maxC=Math.max(maxC,b.maxC)});
  /* collect every distinct cell within that rectangle */
  const inRect=new Set();
  for(let r=minR;r<=maxR;r++)for(let c=minC;c<=maxC;c++){if(grid[r]&&grid[r][c])inRect.add(grid[r][c])}
  const cellsArr=[...inRect];
  /* the top-left cell becomes the merged cell */
  const keeper=grid[minR][minC];
  /* combine content (skip empty <br>) */
  const parts=[];
  cellsArr.forEach(td=>{const h=td.innerHTML.replace(/^\s*<br\s*\/?>\s*$/i,"").trim();if(h)parts.push(h)});
  keeper.innerHTML=parts.join(" ")||"<br>";
  keeper.setAttribute("colspan",(maxC-minC+1));
  keeper.setAttribute("rowspan",(maxR-minR+1));
  /* remove the other cells */
  cellsArr.forEach(td=>{if(td!==keeper)td.remove()});
}
function unmergeCells(tbl,sel){
  const targets=sel.filter(td=>parseInt(td.getAttribute("colspan")||"1")>1||parseInt(td.getAttribute("rowspan")||"1")>1);
  if(!targets.length){return}
  targets.forEach(td=>{
    const cs=parseInt(td.getAttribute("colspan")||"1");
    const rs=parseInt(td.getAttribute("rowspan")||"1");
    td.removeAttribute("colspan");td.removeAttribute("rowspan");
    const tr=td.parentElement;
    const rows=[...tbl.rows];
    const rowIdx=rows.indexOf(tr);
    /* add back the (cs-1) cells in this row after the keeper */
    for(let i=1;i<cs;i++){const nc=document.createElement("td");nc.innerHTML="<br>";td.after(nc)}
    /* add back full rows-worth of cells for each extra spanned row */
    for(let dr=1;dr<rs;dr++){
      const targetRow=rows[rowIdx+dr];
      if(targetRow){for(let i=0;i<cs;i++){const nc=document.createElement("td");nc.innerHTML="<br>";targetRow.appendChild(nc)}}
    }
  });
}
function positionTableBar(tbl){
  const bar=document.getElementById("tablebar");if(!bar)return;
  if(isMobile())return; /* on mobile the bar is pinned to the bottom via CSS */
  const r=tbl.getBoundingClientRect();
  const bw=bar.offsetWidth||340, bh=bar.offsetHeight||60;
  const pad=8;
  /* horizontal: keep fully on screen */
  let left=Math.min(Math.max(pad,r.left),innerWidth-bw-pad);
  if(left<pad)left=pad;
  /* vertical: prefer below the table, but flip above if it would go off the bottom */
  let top=r.bottom+pad;
  if(top+bh>innerHeight-pad){
    const above=r.top-bh-pad;
    if(above>=pad)top=above;                 /* fits above */
    else top=Math.max(pad,innerHeight-bh-pad); /* neither: pin to bottom of screen, fully visible */
  }
  bar.style.left=left+"px";
  bar.style.top=top+"px";
}
function closeTableBar(){const b=document.getElementById("tablebar");if(b){if(b._reflow){window.removeEventListener("scroll",b._reflow,true);window.removeEventListener("resize",b._reflow)}b.remove()}}

/* ================= global search ================= */
function stripHTML(h){const d=document.createElement("div");d.innerHTML=h||"";return d.textContent||""}
function buildSearchIndex(){
  const idx=[];
  S.mains.forEach(main=>{
    main.subs.forEach(sub=>{
      const nav={main:main.id,sub:sub.id};
      const push=(text,loc,extra)=>{if(text&&text.trim())idx.push({text:text.trim(),loc,nav:Object.assign({},nav,extra||{})})};
      const scanItems=(items,loc)=>items.forEach(it=>{push(stripHTML(it.html),loc);if(it.note)push(stripHTML(it.note),loc+" › note")});
      const scanSec=(sec,prefix)=>{
        push(sec.title,(prefix||"")+"section");
        if(sec.type==="tasks")scanItems(sec.items,sec.title);
        if(sec.type==="grid")sec.cells.forEach(c=>scanItems(c.items,sec.title+" › "+c.name));
        if(sec.type==="notes")push(stripHTML(sec.html),sec.title);
        if(sec.type==="deadlines")sec.rows.forEach(r=>push(stripHTML(r.html),sec.title+(r.due?" ("+fmtDue(r.due)+")":"")));
      };
      sub.sections.forEach(sec=>scanSec(sec,sub.name+" › "));
      if(sub.project)(sub.project.detailSections||[]).forEach(sec=>scanSec(sec,sub.name+" details › "));
      push(sub.name,"tab name");
    });
  });
  S.ideas.groups.forEach(g=>{g.items.forEach(it=>{
    idx.push({text:(it.title||"").trim()||"(untitled idea)",loc:"Thrilling Ideas › "+g.name,nav:{ideas:true}});
    (it.items||[]).forEach(x=>{if(stripHTML(x.html).trim())idx.push({text:stripHTML(x.html),loc:"Idea: "+(it.title||"untitled"),nav:{ideas:true}})});
  })});
  return idx;
}
let searchIdx=[],searchCur=0;
function openSearch(){
  if(document.getElementById("searchoverlay"))return;
  searchIdx=buildSearchIndex();
  const ov=document.createElement("div");ov.id="searchoverlay";
  ov.innerHTML=`<div id="searchbox">
    <div id="searchhead">${icon("search",18)}<input id="searchinput" placeholder="Search all tabs, notes, tasks, deadlines, ideas…" autocomplete="off"><span style="font-size:11px;color:var(--ink-soft)">esc</span></div>
    <div id="searchresults"><div class="sr-empty">Start typing to search everything.</div></div>
  </div>`;
  document.body.appendChild(ov);
  const inp=ov.querySelector("#searchinput");
  const res=ov.querySelector("#searchresults");
  setTimeout(()=>inp.focus(),30);
  const run=()=>{
    const q=inp.value.trim().toLowerCase();
    if(!q){res.innerHTML='<div class="sr-empty">Start typing to search everything.</div>';return}
    const hits=[];
    for(const e of searchIdx){
      const low=e.text.toLowerCase();const pos=low.indexOf(q);
      if(pos>-1){hits.push({e,pos});if(hits.length>=60)break}
    }
    searchCur=0;
    if(!hits.length){res.innerHTML='<div class="sr-empty">Nothing found for “'+escHtml(q)+'”.</div>';return}
    res.innerHTML="";
    hits.forEach((h,i)=>{
      const t=h.e.text;const s=Math.max(0,h.pos-30);
      const snippet=(s>0?"…":"")+t.slice(s,h.pos)+"<mark>"+escHtml(t.slice(h.pos,h.pos+q.length))+"</mark>"+t.slice(h.pos+q.length,h.pos+q.length+60)+(t.length>h.pos+q.length+60?"…":"");
      const b=document.createElement("button");b.className="sr-item"+(i===0?" cur":"");b.dataset.i=i;
      b.innerHTML=`<div class="sr-loc">${icon("chevR",11)}${escHtml(h.e.loc)}</div><div class="sr-txt">${snippet}</div>`;
      b.onclick=()=>{goToSearchHit(h.e);closeSearch()};
      res.appendChild(b);
    });
    res._hits=hits;
  };
  inp.addEventListener("input",run);
  inp.addEventListener("keydown",e=>{
    const items=[...res.querySelectorAll(".sr-item")];
    if(e.key==="Escape"){closeSearch()}
    else if(e.key==="ArrowDown"){e.preventDefault();searchCur=Math.min(items.length-1,searchCur+1);items.forEach((x,i)=>x.classList.toggle("cur",i===searchCur));items[searchCur]&&items[searchCur].scrollIntoView({block:"nearest"})}
    else if(e.key==="ArrowUp"){e.preventDefault();searchCur=Math.max(0,searchCur-1);items.forEach((x,i)=>x.classList.toggle("cur",i===searchCur));items[searchCur]&&items[searchCur].scrollIntoView({block:"nearest"})}
    else if(e.key==="Enter"){e.preventDefault();items[searchCur]&&items[searchCur].click()}
  });
  ov.addEventListener("click",e=>{if(e.target===ov)closeSearch()});
}
function goToSearchHit(e){
  if(e.nav.ideas){/* open ideas view on daily adventures */
    const dm=S.mains.find(m=>m.subs.some(s=>s.special==="ideas"));
    if(dm){S.activeMain=dm.id;const ds=dm.subs.find(s=>s.special==="ideas");S.activeSub=ds.id;ideasView=true;detailView=null;ideaDetailView=null;deadlinesView=false}
    fixActive();renderAll();return;
  }
  if(e.nav.main)S.activeMain=e.nav.main;
  if(e.nav.sub)S.activeSub=e.nav.sub;
  ideasView=false;detailView=null;ideaDetailView=null;deadlinesView=false;
  fixActive();renderAll();
}
function closeSearch(){const o=document.getElementById("searchoverlay");if(o)o.remove()}

/* ================= full screen ================= */
function toggleFull(){
  if(document.fullscreenElement){document.exitFullscreen&&document.exitFullscreen()}
  else{document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()}
}

document.addEventListener("click",e=>{
  if(e.target.closest("#searchbtn")){openSearch();return}
  if(e.target.closest("#refreshbtn")){doRefresh();return}
  if(e.target.closest("#fullbtn")){toggleFull();return}
});
async function doRefresh(){
  const btn=document.getElementById("refreshbtn");
  if(btn){btn.classList.add("spinning");}
  try{
    const cloud=await cloudLoadPlanner();
    if(cloud){S=migrateAny(cloud);try{await store.set(KEY,JSON.stringify(S))}catch(e){}fixActive();applyTheme();renderAll();markSaving("saved")}
  }catch(e){}
  if(btn)setTimeout(()=>btn.classList.remove("spinning"),500);
}
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openSearch()}
  /* strikethrough: Cmd/Ctrl+Shift+X (works inside any editable) */
  if((e.metaKey||e.ctrlKey)&&e.shiftKey&&e.key.toLowerCase()==="x"){
    const a=document.activeElement;
    if(a&&a.isContentEditable){e.preventDefault();document.execCommand("strikeThrough");syncFocusedEditable&&syncFocusedEditable()}
  }
});

/* ================= drag a sub-tab into another main tab ================= */
let subDrag=null, justDraggedSub=false;
document.addEventListener("pointerdown",e=>{
  const st=e.target.closest?e.target.closest(".subtab"):null;
  if(!st)return;
  if(e.target.closest(".tabdel,.tabdup,.emobtn,.info,[data-subinfo]"))return;
  if(e.target.isContentEditable)return;
  const subId=st.dataset.sub;
  const sub=activeMain().subs.find(s=>s.id===subId);
  if(!sub||sub.special)return; /* don't move the special ideas tab */
  subDrag={subId,startX:e.clientX,startY:e.clientY,el:st,moving:false,ghost:null};
});
document.addEventListener("pointermove",e=>{
  if(!subDrag)return;
  const dx=e.clientX-subDrag.startX,dy=e.clientY-subDrag.startY;
  if(!subDrag.moving&&Math.hypot(dx,dy)<7)return;
  if(!subDrag.moving){
    subDrag.moving=true;
    subDrag.el.style.opacity=".4";
    const g=document.createElement("div");g.className="subtab-ghost";g.textContent=subDrag.el.querySelector(".tx")?subDrag.el.querySelector(".tx").textContent:"tab";
    document.body.appendChild(g);subDrag.ghost=g;
    document.body.classList.add("subdragging");
  }
  subDrag.ghost.style.left=(e.clientX+10)+"px";subDrag.ghost.style.top=(e.clientY+8)+"px";
  /* highlight a main tab under the pointer */
  document.querySelectorAll(".maintab.droptarget").forEach(x=>x.classList.remove("droptarget"));
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const mt=el&&el.closest?el.closest(".maintab"):null;
  if(mt&&mt.dataset.main!==S.activeMain)mt.classList.add("droptarget");
});
document.addEventListener("pointerup",e=>{
  if(!subDrag)return;
  const wasMoving=subDrag.moving;
  if(subDrag.ghost)subDrag.ghost.remove();
  if(subDrag.el)subDrag.el.style.opacity="";
  document.body.classList.remove("subdragging");
  document.querySelectorAll(".maintab.droptarget").forEach(x=>x.classList.remove("droptarget"));
  if(wasMoving){
    justDraggedSub=true;setTimeout(()=>justDraggedSub=false,50);
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const mt=el&&el.closest?el.closest(".maintab"):null;
    if(mt&&mt.dataset.main!==S.activeMain){
      const from=activeMain();const toId=mt.dataset.main;const to=S.mains.find(x=>x.id===toId);
      const i=from.subs.findIndex(s=>s.id===subDrag.subId);
      if(i>-1&&to){
        const[moved]=from.subs.splice(i,1);
        to.subs.push(moved);
        if(!from.subs.length)from.subs.push(newBlankSub());
        S.activeMain=toId;S.activeSub=moved.id;
        fixActive();renderAll();saveSoon();
      }
    }
  }
  subDrag=null;
});

/* ================= slash command menu ================= */
const SLASH_CMDS=[
  {k:"todo",label:"Checkbox to-do",kind:"todo"},
  {k:"bullet",label:"Bullet point",kind:"bullet"},
  {k:"header",label:"Header",kind:"header"},
  {k:"text",label:"Plain text",kind:"text"},
  {k:"table",label:"Table",note:true},
  {k:"help",label:"— type to filter, Enter to pick —",help:true}
];
function openSlashMenu(targetEl,ctx){
  closeMenus();
  const menu=document.createElement("div");menu.className="menu";menu.id="slashmenu";menu.style.minWidth="200px";
  const inNote=ctx.type==="note";
  let cmds=SLASH_CMDS.filter(c=>!c.help&&(!c.note||inNote));
  let filter="",cur=0;
  /* record where the "/" is so we can delete it (plus any filter text) when a block is picked */
  if(inNote){
    const s=getSelection();
    if(s.rangeCount){ctx.slashRange=s.getRangeAt(0).cloneRange();ctx.slashNode=ctx.slashRange.startContainer;ctx.slashOffset=ctx.slashRange.startOffset;}
  }
  const draw=()=>{
    const shown=cmds.filter(c=>c.label.toLowerCase().includes(filter.toLowerCase()));
    menu.innerHTML=shown.length?shown.map((c,i)=>`<button data-sk="${c.k}" class="${i===cur?'cur':''}" style="${i===cur?'background:var(--line)':''}">${c.label}</button>`).join(""):`<div style="padding:8px 11px;color:var(--ink-soft);font-size:12.5px">no match</div>`;
    menu._shown=shown;
  };
  draw();
  document.body.appendChild(menu);
  const r=(window.getSelection().rangeCount?window.getSelection().getRangeAt(0).getBoundingClientRect():targetEl.getBoundingClientRect());
  placePopup(menu,{left:r.left||100,right:(r.left||100),top:r.top||100,bottom:r.bottom||100});
  const pick=(k)=>{applySlash(k,ctx);closeMenus()};
  menu.addEventListener("click",e=>{const b=e.target.closest("[data-sk]");if(b)pick(b.dataset.sk)});
  const onKey=(e)=>{
    if(!document.getElementById("slashmenu")){document.removeEventListener("keydown",onKey,true);return}
    const shown=menu._shown||[];
    if(e.key==="Escape"){e.preventDefault();closeMenus();document.removeEventListener("keydown",onKey,true)}
    else if(e.key==="ArrowDown"){e.preventDefault();cur=Math.min(shown.length-1,cur+1);draw()}
    else if(e.key==="ArrowUp"){e.preventDefault();cur=Math.max(0,cur-1);draw()}
    else if(e.key==="Enter"){e.preventDefault();if(shown[cur])pick(shown[cur].k);document.removeEventListener("keydown",onKey,true)}
    else if(e.key==="Backspace"){if(filter===""){closeMenus();document.removeEventListener("keydown",onKey,true)}else{e.preventDefault();filter=filter.slice(0,-1);cur=0;draw()}}
    else if(e.key.length===1){e.preventDefault();filter+=e.key;cur=0;draw()}
  };
  setTimeout(()=>document.addEventListener("keydown",onKey,true),0);
}
function deleteSlashText(ctx){
  /* remove the "/" (and typed filter) preceding the caret in a note */
  try{
    const node=ctx.slashNode;
    if(node&&node.nodeType===3){
      const off=ctx.slashOffset;
      const before=node.textContent.slice(0,off);
      const slashIdx=before.lastIndexOf("/");
      if(slashIdx>-1){
        node.textContent=before.slice(0,slashIdx)+node.textContent.slice(off);
        const r=document.createRange();r.setStart(node,slashIdx);r.collapse(true);
        const s=getSelection();s.removeAllRanges();s.addRange(r);
      }
    }
  }catch(e){}
}
function applySlash(k,ctx){
  if(ctx.type==="item"){
    const it=ctx.item;
    if(k==="table"){return}
    it.kind=k;if(k!=="todo")it.done=false;
    it.html=(it.html||"").replace(/^\/\S*/,"");
    pendingFocus=it.id;(viewer?renderViewer(sharedRef):renderPage());saveSoon();
  }else if(ctx.type==="note"){
    const rn=ctx.el;rn.focus();
    deleteSlashText(ctx);
    if(k==="todo"){makeCheckboxLine(rn)}
    else if(k==="bullet"){document.execCommand("insertUnorderedList")}
    else if(k==="header"){document.execCommand("formatBlock",false,"H3")}
    else if(k==="text"){document.execCommand("formatBlock",false,"DIV")}
    else if(k==="table"){openTableSizePicker(document.getElementById("tablebtn"))}
    rn.dispatchEvent(new Event("input",{bubbles:true}));
  }
}
